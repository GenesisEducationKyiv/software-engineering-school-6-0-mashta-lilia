run:
  timeout: 5m

linters:
  enable:
    # --- Basic ---
    - errcheck
    - govet
    - staticcheck
    - gosimple
    - ineffassign
    - unused
    - goimports
    - misspell
    - gocyclo
    - dupl
    - gosec
    - revive

    # --- HTTP / DB safety ---
    - bodyclose
    - sqlclosecheck
    - rowserrcheck
    - noctx

    # --- Error handling ---
    - errorlint
    - wrapcheck
    - nilerr

    # --- Context ---
    - contextcheck

    # --- Code quality ---
    - goconst
    - musttag
    - usestdlibvars
    - recvcheck
    - unparam

    # --- Metrics / Linting hygiene ---
    - promlinter
    - nolintlint

linters-settings:
  gocyclo:
    min-complexity: 15
  dupl:
    threshold: 100
  wrapcheck:
    ignorePackageGlobs:
      - "github-release-notifier/*"

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - dupl
        - wrapcheck