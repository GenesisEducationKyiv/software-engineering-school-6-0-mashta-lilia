version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    # --- Basic ---
    - errcheck        # неперевірені помилки (file.Close(), rows.Err())
    - govet           # підозрілі конструкції: shadowed variables, неправильні format strings
    - staticcheck     # найпотужніший аналізатор: deprecated API, dead code, неефективний код
    - gosimple        # спрощення коду: зайві else, надлишкові конверсії
    - ineffassign     # присвоєння яке одразу перезаписується і ніколи не використовується
    - unused          # невикористані функції, змінні, типи, константи
    - goimports       # форматування імпортів і групування (stdlib / external / internal)
    - misspell        # орфографія в коментарях і рядкових літералах
    - gocyclo         # cyclomatic complexity — складність функцій
    - dupl            # дублювання коду між функціями
    - gosec           # security issues: hardcoded credentials, SQL injection, weak crypto
    - revive          # стилістичні правила: drop else after return, blank imports

    # --- HTTP / DB safety ---
    - bodyclose       # http.Response.Body не закритий → goroutine / connection leak
    - sqlclosecheck   # sql.Rows, sql.Stmt не закриті → leak пулу з'єднань
    - rowserrcheck    # rows.Err() не перевіряється після ітерації по рядках БД
    - noctx           # HTTP або DB виклики без context.Context

    # --- Error handling ---
    - errorlint       # порівняння err == ErrX замість errors.Is() для wrapped errors
    - wrapcheck       # помилки з зовнішніх пакетів не загорнуті через %w
    - nilerr          # return nil коли err != nil — помилка проковтнута

    # --- Context ---
    - contextcheck    # передача неправильного або неуспадкованого ctx через ланцюг викликів

    # --- Code quality ---
    - goconst         # повторювані рядкові літерали які варто винести в константи
    - musttag         # struct поля без json/db тегів при marshal/unmarshal
    - usestdlibvars   # "GET" замість http.MethodGet, "200" замість http.StatusOK
    - recvcheck       # непослідовне використання pointer vs value receiver
    - unparam         # параметри функцій які завжди викликаються з одним і тим самим значенням

    # --- Metrics / Linting hygiene ---
    - promlinter      # Prometheus метрики: snake_case, суфікси _total, _seconds, _bytes
    - nolintlint      # //nolint директиви без пояснення або з неіснуючим лінтером

  settings:
    gocyclo:
      min-complexity: 15
    dupl:
      threshold: 100
    wrapcheck:
      ignorePackageGlobs:
        - "github-release-notifier/*"

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck        # в тестах часто свідомо ігноруємо помилки
        - dupl            # тест хелпери природно дублюють структуру
        - wrapcheck       # в тестах не потрібно загортати помилки
