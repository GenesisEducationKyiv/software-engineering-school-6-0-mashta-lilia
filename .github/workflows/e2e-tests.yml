name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Cache keyed off the committed lockfile so dependency installs are
          # reproducible across runs and fast on cache hit.
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install e2e npm dependencies
        working-directory: e2e
        # npm ci enforces the lockfile: same versions every run, fails loudly
        # if package.json and package-lock.json drift out of sync.
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e suite
        # run.sh boots docker-compose.e2e.yml (postgres + redis + mailpit +
        # the app image built from the project Dockerfile), runs Playwright
        # tests, then tears the stack down.
        run: bash e2e/scripts/run.sh

      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
