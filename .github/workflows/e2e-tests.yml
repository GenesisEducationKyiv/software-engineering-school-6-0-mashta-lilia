name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # actions/setup-node's npm cache requires a package-lock.json
          # to compute a stable key; we don't commit one yet, so caching
          # is intentionally disabled here. Re-enable once e2e/package-lock.json
          # is committed alongside the deps.

      - name: Install e2e npm dependencies
        working-directory: e2e
        # No lockfile committed yet; npm install is the honest choice.
        run: npm install

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e suite
        # run.sh boots docker-compose.e2e.yml (postgres + redis + mailpit +
        # the app image built from the project Dockerfile), runs Playwright
        # tests, then tears the stack down.
        run: bash e2e/scripts/run.sh

      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
